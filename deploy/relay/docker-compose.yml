services:
  yachoo-relay:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: yachoo-relay
    restart: unless-stopped
    environment:
      PORT: "8080"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  caddy:
    image: caddy:2-alpine
    container_name: yachoo-relay-caddy
    restart: unless-stopped
    depends_on:
      yachoo-relay:
        condition: service_healthy
    environment:
      RELAY_HOST: ${RELAY_HOST}
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
